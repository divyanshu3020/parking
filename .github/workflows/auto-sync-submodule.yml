name: Auto Sync Submodule
on:
  repository_dispatch:
    types: [update-submodule]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive

      - name: Update specific submodule
        run: |
          SERVICE_NAME="${{ github.event.client_payload.service }}"
          echo "Updating submodule: services/$SERVICE_NAME"
          
          cd services/$SERVICE_NAME
          git pull origin main
          cd ../..
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/$SERVICE_NAME
          git commit -m "chore: auto-sync submodule services/$SERVICE_NAME"
          git push origin main
